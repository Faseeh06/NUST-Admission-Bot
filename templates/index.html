<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NUST Admissions · Offline</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="shell">
      <header class="head">
        <div class="head-top">
          <div class="head-text">
            <p class="line title">NUST admissions assistant</p>
            <p class="line dim">
              Offline FAQ · <span id="faq-count">…</span> · verify on the official site.
            </p>
          </div>
          <button type="button" class="btn-clear" id="clear-history">
            Clear history
          </button>
        </div>
      </header>

      <main class="panel">
        <div class="chat" id="chat" aria-live="polite"></div>
        <form class="composer" id="form" autocomplete="off">
          <label class="sr-only" for="msg">Your question</label>
          <textarea
            id="msg"
            name="msg"
            rows="2"
            placeholder="Type a question…"
            required
          ></textarea>
          <div class="composer-row">
            <div class="chips" id="chips"></div>
            <button type="submit" id="send">Send</button>
          </div>
        </form>
      </main>

      <footer class="foot">
        <p class="line dim">data/faq.json · no network after setup</p>
      </footer>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
